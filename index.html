<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guru App - E-Rapot</title>
    <link rel="manifest" href="manifest_guru.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #111827 0%, #312e81 100%); min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent;}
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); }
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 22px; height: 22px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="text-slate-800">

    <div id="viewLogin" class="flex flex-col items-center justify-center min-h-screen p-6 fade-in">
        <div class="glass-card w-full max-w-sm rounded-3xl shadow-2xl p-8 text-center relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-500 rounded-full mix-blend-multiply filter blur-2xl opacity-20 -mr-10 -mt-10"></div>
            <div class="absolute bottom-0 left-0 w-32 h-32 bg-purple-500 rounded-full mix-blend-multiply filter blur-2xl opacity-20 -ml-10 -mb-10"></div>
            
            <div class="bg-gradient-to-tr from-indigo-600 to-purple-600 text-white w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg transform rotate-3">
                <i class="fas fa-fingerprint text-4xl -rotate-3"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-gray-900 mb-2 tracking-tight">Portal Nilai</h1>
            <p class="text-sm text-gray-500 mb-8 font-medium">Otentikasi Asatidzah</p>

            <div class="text-left mb-5">
                <label class="block text-xs font-bold text-gray-600 mb-2 ml-1 uppercase tracking-wide">Pilih Semester</label>
                <div class="relative">
                    <select id="loginSelectSemester" onchange="loadMasterData()" class="w-full bg-indigo-50 border-2 border-indigo-200 text-indigo-900 text-sm font-bold rounded-xl focus:ring-indigo-500 focus:border-indigo-500 block p-3.5 shadow-sm appearance-none">
                        <option value="2024_Ganjil">2024/2025 - Ganjil</option>
                        <option value="2024_Genap">2024/2025 - Genap</option>
                        <option value="2025_Ganjil" selected>2025/2026 - Ganjil</option>
                        <option value="2025_Genap">2025/2026 - Genap</option>
                        <option value="2026_Ganjil">2026/2027 - Ganjil</option>
                        <option value="2026_Genap">2026/2027 - Genap</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-indigo-500">
                        <i class="fas fa-chevron-down text-xs"></i>
                    </div>
                </div>
            </div>

            <div class="text-left mb-5">
                <label class="block text-xs font-bold text-gray-600 mb-2 ml-1 uppercase tracking-wide">Pilih Identitas</label>
                <div class="relative">
                    <select id="loginSelectGuru" class="w-full bg-gray-50 border-2 border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-indigo-500 focus:border-indigo-500 block p-3.5 shadow-sm appearance-none font-medium transition-colors">
                        <option value="">Memuat data server...</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-gray-400">
                        <i class="fas fa-chevron-down text-xs"></i>
                    </div>
                </div>
            </div>

            <div class="text-left mb-8">
                <label class="block text-xs font-bold text-gray-600 mb-2 ml-1 uppercase tracking-wide">PIN Keamanan</label>
                <input type="password" id="loginPin" pattern="[0-9]*" inputmode="numeric" placeholder="••••••" class="w-full bg-gray-50 border-2 border-gray-200 text-gray-900 text-center text-2xl tracking-[0.5em] rounded-xl focus:ring-indigo-500 focus:border-indigo-500 block p-3.5 shadow-sm transition-colors font-mono">
            </div>
            <button onclick="prosesLogin()" class="w-full text-white bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 focus:ring-4 focus:ring-indigo-300 font-bold rounded-xl text-base px-5 py-4 text-center shadow-[0_10px_20px_rgba(79,70,229,0.3)] transition-transform active:scale-95">Verifikasi Masuk <i class="fas fa-arrow-right ml-2"></i></button>
        </div>
    </div>

    <div id="viewDashboard" class="hidden flex flex-col min-h-screen pb-24 fade-in">
        <header class="pt-12 pb-8 px-6 bg-white/10 backdrop-blur-xl border-b border-white/20 shadow-lg sticky top-0 z-10">
            <div class="flex justify-between items-start">
                <div>
                    <div class="inline-block px-3 py-1 bg-indigo-500/30 text-indigo-100 rounded-full text-xs font-bold uppercase tracking-wider mb-2 border border-indigo-400/30">Semester: <span id="dashSemesterText">...</span></div>
                    <h2 id="dashNamaGuru" class="text-3xl font-extrabold text-white tracking-tight">Ust. Fulan</h2>
                </div>
                <button onclick="logout()" class="w-12 h-12 bg-white/10 border border-white/20 rounded-2xl flex items-center justify-center text-white hover:bg-white/20 active:scale-90 transition-all shadow-lg">
                    <i class="fas fa-power-off text-lg"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 p-6">
            <h3 class="text-indigo-100 font-bold mb-5 flex items-center text-lg tracking-wide"><i class="fas fa-layer-group mr-3 text-indigo-400 text-xl"></i> Tugas Mengajar</h3>
            <div id="listTugas" class="space-y-5"></div>
        </main>
    </div>

    <div id="viewInput" class="hidden flex flex-col min-h-screen bg-gray-50 fade-in relative">
        <header class="bg-gradient-to-r from-indigo-900 to-indigo-800 text-white pt-12 pb-6 px-6 shadow-xl sticky top-0 z-20 border-b border-indigo-700">
            <div class="flex items-center">
                <button onclick="kembaliKeDashboard()" class="w-12 h-12 flex items-center justify-center bg-white/10 active:bg-white/20 rounded-2xl mr-4 transition-colors">
                    <i class="fas fa-arrow-left text-xl"></i>
                </button>
                <div class="flex-1">
                    <h2 id="inputTitleMapel" class="text-2xl font-extrabold leading-tight tracking-tight shadow-sm">Nama Mapel</h2>
                    <p id="inputTitleKelas" class="text-sm text-indigo-200 font-medium mt-1 flex items-center"><i class="fas fa-chalkboard text-xs mr-2"></i> Nama Kelas</p>
                </div>
            </div>
        </header>

        <main class="flex-1 p-4 pb-32 max-w-lg mx-auto w-full">
            
            <!-- PANEL ATUR RUMUS PENILAIAN -->
            <div class="mb-5">
                <button onclick="togglePanelRumus()" class="w-full bg-white border border-indigo-100 text-indigo-700 font-bold py-3 px-5 rounded-2xl shadow-sm flex justify-between items-center transition-all hover:bg-indigo-50">
                    <span class="flex items-center"><i class="fas fa-calculator mr-3 text-lg"></i> Atur Rumus Penilaian</span>
                    <i class="fas fa-chevron-down text-sm transition-transform" id="iconRumus"></i>
                </button>
                <div id="panelRumus" class="hidden bg-white mt-2 p-5 rounded-2xl shadow-lg border border-indigo-100 fade-in">
                    <div class="bg-indigo-50 text-indigo-800 text-[11px] p-3 rounded-xl mb-4 font-semibold border border-indigo-100">
                        <i class="fas fa-info-circle mr-1"></i> Tambahkan komponen nilai. Pastikan total bobot mencapai tepat <b class="font-black text-red-500">100%</b>.
                    </div>
                    <div id="listRumus" class="space-y-3 mb-4"></div>
                    <button onclick="tambahRumus()" class="w-full py-2.5 rounded-xl border-2 border-dashed border-indigo-300 text-indigo-600 font-bold text-sm hover:bg-indigo-50 transition"><i class="fas fa-plus mr-1"></i> Tambah Komponen Ujian</button>
                    
                    <div class="mt-5 border-t border-gray-100 pt-4 flex justify-between items-center">
                        <div class="text-sm font-extrabold text-gray-700">Total: <span id="totRumus" class="text-red-500 text-lg">0</span>%</div>
                        <button onclick="simpanRumus()" class="bg-indigo-600 text-white text-sm font-bold px-6 py-2.5 rounded-xl shadow-[0_4px_12px_rgba(79,70,229,0.3)] active:scale-95 transition">Terapkan</button>
                    </div>
                </div>
            </div>

            <!-- DAFTAR SISWA & INPUT GRID -->
            <div id="listSiswaInput" class="space-y-4"></div>

        </main>

        <div class="fixed bottom-0 left-0 right-0 p-5 bg-white/90 backdrop-blur-md border-t border-gray-200 shadow-[0_-10px_30px_rgba(0,0,0,0.1)] z-20">
            <button id="btnSimpanNilai" onclick="simpanKeServer()" class="w-full max-w-lg mx-auto text-white bg-indigo-600 hover:bg-indigo-700 font-extrabold rounded-2xl text-lg px-5 py-4 shadow-[0_8px_20px_rgba(79,70,229,0.4)] active:scale-[0.98] transition-all flex justify-center items-center tracking-wide block">
                <i class="fas fa-cloud-upload-alt mr-3 text-2xl"></i> Simpan Rapot
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        // GANTI DENGAN FIREBASE USTADZ
        const firebaseConfig = {
            apiKey: "AIzaSyDe005OXrgGH2oojwwUGnsmzEr0RxzmnMI",
            authDomain: "rapotmaster-attauhid.firebaseapp.com",
            databaseURL: "https://rapotmaster-attauhid-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rapotmaster-attauhid",
            storageBucket: "rapotmaster-attauhid.firebasestorage.app",
            messagingSenderId: "759283304078",
            appId: "1:759283304078:web:f9fc81f8426fa2e69bebdf"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let dataGuruAll = {}; let dataKelasAll = {}; let dataMapelAll = {}; let dataNilaiAll = {};
        
        let loggedInGuruId = null;
        let activeTugas = null; 
        let activeSemesterGuru = "2025_Ganjil"; 

        let unsubGuru, unsubKelas, unsubMapel, unsubNilai; 
        
        // VARIABEL RUMUS
        let activeKomponen = [];
        let tempKomponen = [];

        window.loadMasterData = function() {
            activeSemesterGuru = document.getElementById('loginSelectSemester').value;
            document.getElementById('loginSelectGuru').innerHTML = '<option value="">Memuat data server...</option>';

            if(unsubGuru) unsubGuru(); if(unsubKelas) unsubKelas(); if(unsubMapel) unsubMapel(); if(unsubNilai) unsubNilai();

            unsubGuru = onValue(ref(db, `TahunAjaran/${activeSemesterGuru}/Master/Guru`), (snap) => { 
                dataGuruAll = snap.val() || {}; 
                renderDropdownLogin(); 
                if(loggedInGuruId && dataGuruAll[loggedInGuruId]) renderTugasDashboard(); 
            });
            unsubKelas = onValue(ref(db, `TahunAjaran/${activeSemesterGuru}/Master/Kelas`), (snap) => { dataKelasAll = snap.val() || {}; });
            unsubMapel = onValue(ref(db, `TahunAjaran/${activeSemesterGuru}/Master/Mapel`), (snap) => { dataMapelAll = snap.val() || {}; });
            
            unsubNilai = onValue(ref(db, `TahunAjaran/${activeSemesterGuru}/Nilai`), (snap) => {
                dataNilaiAll = snap.val() || {};
                if(loggedInGuruId && dataGuruAll[loggedInGuruId]) renderTugasDashboard(); 
            });
        };

        const viewLogin = document.getElementById('viewLogin');
        const viewDashboard = document.getElementById('viewDashboard');
        const viewInput = document.getElementById('viewInput');

        function switchView(viewElement) {
            [viewLogin, viewDashboard, viewInput].forEach(v => {
                v.classList.add('hidden'); v.classList.remove('fade-in');
            });
            viewElement.classList.remove('hidden');
            void viewElement.offsetWidth;
            viewElement.classList.add('fade-in');
        }

                window.getBadgeInfo = function(nilaiStr) {
            if(nilaiStr === "") return { class: 'bg-gray-100 text-gray-400 border-gray-200', text: '- (-)' };
            const n = parseFloat(nilaiStr);
            if(n > 100 || n < 0) return { class: 'bg-red-100 text-red-700 border-red-300', text: 'Error' };
            
            if(n >= 90) return { class: 'bg-emerald-100 text-emerald-800 border-emerald-400', text: 'Istimewa (ممتاز)' };
            if(n >= 80) return { class: 'bg-blue-100 text-blue-800 border-blue-400', text: 'Bagus Sekali (جيد جدا)' };
            if(n >= 70) return { class: 'bg-green-100 text-green-700 border-green-300', text: 'Bagus (جيد)' };
            if(n >= 60) return { class: 'bg-yellow-100 text-yellow-800 border-yellow-400', text: 'Cukup (مقبول)' };
            return { class: 'bg-red-100 text-red-800 border-red-500', text: 'Kurang (ناقص)' };
        };

        function renderDropdownLogin() {
            const select = document.getElementById('loginSelectGuru');
            if(loggedInGuruId) return; 
            select.innerHTML = '<option value="">-- Pilih Nama --</option>' + Object.entries(dataGuruAll).map(([id, g]) => `<option value="${id}">${g.nama}</option>`).join('');
        }

        window.prosesLogin = function() {
            const id = document.getElementById('loginSelectGuru').value;
            const pin = document.getElementById('loginPin').value;
            activeSemesterGuru = document.getElementById('loginSelectSemester').value;

            if(!id || !pin) return alert('Silakan pilih identitas dan masukkan PIN!');
            
            if(dataGuruAll[id].pin === pin) {
                loggedInGuruId = id;
                document.getElementById('loginPin').value = '';
                document.getElementById('dashNamaGuru').innerText = dataGuruAll[id].nama;
                document.getElementById('dashSemesterText').innerText = activeSemesterGuru.replace('_', ' ');
                
                onValue(ref(db, `TahunAjaran/${activeSemesterGuru}/Nilai`), (snap) => { 
                    dataNilaiAll = snap.val() || {}; 
                    if(activeTugas === null) renderTugasDashboard(); 
                });
                switchView(viewDashboard);
            } else { alert('PIN Salah. Akses Ditolak.'); }
        };

        window.logout = function() {
            loggedInGuruId = null;
            document.getElementById('loginSelectGuru').value = '';
            document.body.style.background = 'linear-gradient(135deg, #111827 0%, #312e81 100%)';
            switchView(viewLogin);
        };

        function renderTugasDashboard() {
            const tugas = dataGuruAll[loggedInGuruId].tugasMengajar || [];
            const container = document.getElementById('listTugas');
            
            if(tugas.length === 0) {
                container.innerHTML = '<div class="glass-card p-8 rounded-3xl text-center text-white/80 border-dashed border-2 border-white/30"><i class="fas fa-mug-hot text-4xl mb-4 opacity-50"></i><p>Belum ada kelas yang ditugaskan kepada Anda saat ini.</p></div>';
                return;
            }

            let html = '';
            tugas.forEach(t => {
                const kNama = dataKelasAll[t.idKelas]?.nama || 'Kelas Dihapus';
                const mNama = dataMapelAll[t.idMapel]?.nama || 'Mapel Dihapus';
                let sTotal = 0;
                Object.values(dataKelasAll[t.idKelas]?.siswa || {}).forEach(s => {
                    if(s.status !== 'nonaktif' || (s.nonaktifSemester && s.nonaktifSemester !== activeSemesterGuru)) sTotal++;
                });

                const terisi = Object.keys(dataNilaiAll[t.idKelas]?.[t.idMapel] || {}).length;
                const persen = sTotal === 0 ? 0 : Math.min(100, Math.round((terisi/sTotal)*100));
                
                let pColor = persen === 100 ? 'from-green-400 to-emerald-500' : 'from-amber-400 to-orange-500';
                let iconStatus = persen === 100 ? '<i class="fas fa-check-circle text-green-400 text-xl shadow-sm rounded-full bg-white"></i>' : '';

                html += `
                <div onclick="bukaInputNilai('${t.idKelas}', '${t.idMapel}')" class="glass-card rounded-3xl p-6 shadow-xl active:scale-[0.97] transition-all cursor-pointer relative overflow-hidden group">
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-white/5 rounded-full transition-transform group-hover:scale-150 duration-500"></div>
                    <div class="flex justify-between items-center mb-4">
                        <span class="bg-indigo-600/20 text-indigo-100 text-xs font-extrabold px-3 py-1.5 rounded-xl border border-indigo-400/30 backdrop-blur-sm tracking-wide uppercase">${kNama}</span>
                        ${iconStatus}
                    </div>
                    <h4 class="text-2xl font-extrabold text-white mb-2 tracking-tight">${mNama}</h4>
                    <p class="text-sm text-indigo-200 mb-5 font-medium"><i class="fas fa-users mr-2 opacity-70"></i>${sTotal} Santri</p>
                    
                    <div class="mt-2">
                        <div class="flex items-center justify-between text-xs mb-2">
                            <span class="text-indigo-200 font-medium">Progres Pengisian</span>
                            <span class="font-bold text-white bg-black/20 px-2 py-0.5 rounded-lg">${terisi}/${sTotal} (${persen}%)</span>
                        </div>
                        <div class="w-full bg-black/20 rounded-full h-2 backdrop-blur-sm overflow-hidden border border-white/5">
                            <div class="bg-gradient-to-r ${pColor} h-2 rounded-full transition-all duration-1000 ease-out" style="width: ${persen}%"></div>
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        // --- SISTEM RUMUS KOMPONEN NILAI ---
        window.togglePanelRumus = function() {
            const p = document.getElementById('panelRumus');
            const icon = document.getElementById('iconRumus');
            p.classList.toggle('hidden');
            if(!p.classList.contains('hidden')) {
                icon.classList.add('rotate-180');
                tempKomponen = JSON.parse(JSON.stringify(activeKomponen));
                renderListRumus();
            } else {
                icon.classList.remove('rotate-180');
            }
        };

        window.renderListRumus = function() {
            let html = ''; let tot = 0;
            tempKomponen.forEach((k, i) => {
                tot += parseFloat(k.bobot) || 0;
                html += `
                <div class="flex gap-2 items-center bg-gray-50 p-2 rounded-xl border border-gray-200">
                    <select id="r_nama_${i}" onchange="updateTempRumus()" class="flex-1 bg-transparent text-sm text-indigo-900 font-bold focus:outline-none focus:ring-0 appearance-none">
                        <option value="Ujian Harian" ${k.nama=='Ujian Harian'?'selected':''}>Ujian Harian</option>
                        <option value="Nilai UTS" ${k.nama=='Nilai UTS'?'selected':''}>Nilai UTS</option>
                        <option value="Nilai UAS" ${k.nama=='Nilai UAS'?'selected':''}>Nilai UAS</option>
                        <option value="Tugas 1" ${k.nama=='Tugas 1'?'selected':''}>Tugas 1</option>
                        <option value="Tugas 2" ${k.nama=='Tugas 2'?'selected':''}>Tugas 2</option>
                        <option value="Tugas 3" ${k.nama=='Tugas 3'?'selected':''}>Tugas 3</option>
                        <option value="Praktek" ${k.nama=='Praktek'?'selected':''}>Praktek</option>
                        <option value="Nilai Akhir" ${k.nama=='Nilai Akhir'?'selected':''}>Nilai Akhir</option>
                    </select>
                    <div class="flex items-center bg-white border border-gray-300 rounded-lg px-2 overflow-hidden shadow-inner">
                        <input type="number" id="r_bobot_${i}" value="${k.bobot}" oninput="updateTempRumus()" placeholder="0" class="w-10 py-2 text-sm font-black text-center text-indigo-600 focus:outline-none">
                        <span class="text-xs text-gray-400 font-bold">%</span>
                    </div>
                    <button onclick="hapusRumus(${i})" class="w-8 h-8 flex items-center justify-center text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition"><i class="fas fa-times"></i></button>
                </div>`;
            });
            document.getElementById('listRumus').innerHTML = html;
            
            const tr = document.getElementById('totRumus');
            tr.innerText = tot;
            if(tot !== 100) { tr.className = "text-red-500 text-lg font-bold"; } 
            else { tr.className = "text-emerald-500 text-lg font-bold"; }
        };

        // PERBAIKAN: Fungsi ini tidak me-render ulang list agar keyboard tidak turun
        window.updateTempRumus = function() {
            let tot = 0;
            tempKomponen.forEach((k, i) => {
                if(document.getElementById(`r_nama_${i}`)) {
                    k.nama = document.getElementById(`r_nama_${i}`).value;
                    k.bobot = parseFloat(document.getElementById(`r_bobot_${i}`).value) || 0;
                    tot += k.bobot;
                }
            });
            
            const tr = document.getElementById('totRumus');
            tr.innerText = tot;
            if(tot !== 100) { tr.className = "text-red-500 text-lg font-bold"; } 
            else { tr.className = "text-emerald-500 text-lg font-bold"; }
        };

        window.tambahRumus = function() {
            tempKomponen.push({ id: 'k'+Date.now(), nama: 'Ujian Harian', bobot: 0 });
            renderListRumus();
        };

        window.hapusRumus = function(idx) {
            tempKomponen.splice(idx, 1);
            renderListRumus();
        };

        window.simpanRumus = function() {
            let tot = 0; tempKomponen.forEach(k => tot += k.bobot);
            if(tot !== 100) return alert('Total persentase bobot harus tepat 100% (saat ini '+tot+'%). Tidak bisa disimpan!');
            if(tempKomponen.length === 0) return alert('Minimal harus ada 1 komponen nilai!');
            
            activeKomponen = JSON.parse(JSON.stringify(tempKomponen));
            
            set(ref(db, `TahunAjaran/${activeSemesterGuru}/PengaturanKomponen/${activeTugas.idKelas}/${activeTugas.idMapel}`), activeKomponen);
            
            document.getElementById('panelRumus').classList.add('hidden');
            document.getElementById('iconRumus').classList.remove('rotate-180');
            renderSiswaInputUI(); 
        };

        // --- RENDER FORM INPUT NILAI ---
        window.bukaInputNilai = function(idKelas, idMapel) {
            activeTugas = { idKelas, idMapel };
            document.body.style.background = '#f9fafb'; 
            
            document.getElementById('inputTitleMapel').innerText = dataMapelAll[idMapel].nama;
            document.getElementById('inputTitleKelas').innerText = dataKelasAll[idKelas].nama;

            document.getElementById('listSiswaInput').innerHTML = '<div class="text-center p-12"><span class="spinner !border-indigo-600 !border-t-indigo-200"></span><p class="text-indigo-600 mt-4 font-bold text-sm">Menyiapkan form penilaian...</p></div>';
            switchView(viewInput);

            get(ref(db, `TahunAjaran/${activeSemesterGuru}/PengaturanKomponen/${idKelas}/${idMapel}`)).then(snap => {
                if(snap.exists()) activeKomponen = snap.val();
                else activeKomponen = [{ id: 'k1', nama: 'Nilai Akhir', bobot: 100 }];
                renderSiswaInputUI();
            }).catch(err => {
                activeKomponen = [{ id: 'k1', nama: 'Nilai Akhir', bobot: 100 }];
                renderSiswaInputUI();
            });
        };

        window.renderSiswaInputUI = function() {
            const { idKelas, idMapel } = activeTugas;
            const siswaObj = dataKelasAll[idKelas].siswa || {};
            const container = document.getElementById('listSiswaInput');
            
            let siswaTerfilter = [];
            Object.entries(siswaObj).forEach(([idSiswa, s]) => {
                let adaRiwayatDiSemesterIni = dataNilaiAll[idKelas]?.[idMapel]?.[idSiswa] !== undefined;
                if (s.status !== 'nonaktif' || adaRiwayatDiSemesterIni) siswaTerfilter.push({idSiswa, ...s});
            });

            if(siswaTerfilter.length === 0) {
                container.innerHTML = '<div class="text-center p-10 bg-white rounded-3xl shadow-sm border border-gray-100 text-gray-500"><i class="fas fa-folder-open text-4xl mb-4 opacity-30"></i><p>Belum ada siswa aktif di kelas ini.</p></div>';
                return;
            }

            let html = ''; let num = 1;
            let gridCols = activeKomponen.length >= 3 ? 'grid-cols-3' : (activeKomponen.length === 2 ? 'grid-cols-2' : 'grid-cols-1');

            siswaTerfilter.forEach((s) => {
                const idSiswa = s.idSiswa;
                const dbData = dataNilaiAll[idKelas]?.[idMapel]?.[idSiswa] || {};
                const nilaiExist = dbData.nilaiAngka ?? "";
                const detailExist = dbData.detail || {};
                
                let statusLabel = s.status === 'nonaktif' ? `<span class="bg-red-100 text-red-600 text-[9px] px-1.5 py-0.5 rounded ml-2 font-bold uppercase tracking-wider">Arsip</span>` : '';

                let inputGrid = '';
                activeKomponen.forEach(k => {
                    let v = detailExist[k.id] !== undefined ? detailExist[k.id] : '';
                    if(v === '' && activeKomponen.length === 1 && nilaiExist !== '') v = nilaiExist;

                    inputGrid += `
                    <div class="bg-gray-50 rounded-2xl p-2.5 border border-gray-100 relative shadow-inner">
                        <label class="block text-[10px] font-extrabold text-indigo-400 uppercase tracking-widest mb-1.5 truncate text-center">${k.nama}</label>
                        <input type="number" id="input_${idSiswa}_${k.id}" value="${v}" oninput="hitungTotalLive('${idSiswa}')" placeholder="0" class="w-full bg-white border border-gray-200 text-center text-xl font-black text-indigo-900 rounded-xl py-2 focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20 transition-all shadow-sm komp-input-${idSiswa}">
                        <div class="absolute top-1 right-2 text-[9px] font-bold text-gray-300">${k.bobot}%</div>
                    </div>`;
                });

                // PERBAIKAN: Menambahkan elemen angka besar untuk "Nilai Rapot" (angka_final_X)
                html += `
                <div class="bg-white p-5 rounded-3xl shadow-[0_4px_15px_rgba(0,0,0,0.03)] border border-gray-100 transition-all hover:shadow-[0_8px_25px_rgba(0,0,0,0.06)] group row-nilai mb-4" data-idsiswa="${idSiswa}">
                    <div class="flex items-center justify-between mb-4 border-b border-gray-50 pb-3">
                        <div class="flex-1 pr-2">
                            <div class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-1"><i class="fas fa-user-graduate mr-1"></i> Santri No. ${num++}</div>
                            <h4 class="font-extrabold text-gray-800 text-lg leading-tight tracking-tight">${s.nama} ${statusLabel}</h4>
                        </div>
                        
                        <div class="text-center w-[85px] shrink-0 bg-indigo-50/50 p-2 rounded-2xl border border-indigo-100 flex flex-col items-center justify-center">
                            <div class="text-[9px] font-bold text-indigo-500 mb-1 uppercase tracking-widest">NILAI RAPOT</div>
                            <div id="angka_final_${idSiswa}" class="text-3xl font-black text-indigo-900 leading-none mb-1.5">${nilaiExist || '-'}</div>
                            <span id="badge_${idSiswa}" class="text-[10px] font-extrabold px-1.5 py-0.5 rounded-lg block border shadow-sm transition-colors duration-300">-</span>
                            <input type="hidden" id="final_${idSiswa}" value="${nilaiExist}">
                        </div>

                    </div>
                    <div class="grid ${gridCols} gap-2">
                        ${inputGrid}
                    </div>
                </div>`;
            });
            container.innerHTML = html;

            siswaTerfilter.forEach(s => window.hitungTotalLive(s.idSiswa));
        };

        // PERBAIKAN: Menyalurkan angka hasil hitungan ke elemen angka besar (angka_final_X)
        window.hitungTotalLive = function(idSiswa) {
            let total = 0;
            let semuaKosong = true;
            
            activeKomponen.forEach(k => {
                const input = document.getElementById(`input_${idSiswa}_${k.id}`);
                if(input && input.value !== "") {
                    semuaKosong = false;
                    let val = parseFloat(input.value);
                    if(val < 0) val = 0; if(val > 100) val = 100;
                    if(input.value != val) input.value = val;
                    total += val * (k.bobot / 100);
                }
            });

            const finalInput = document.getElementById(`final_${idSiswa}`);
            const badgeSpan = document.getElementById(`badge_${idSiswa}`);
            const angkaFinalDiv = document.getElementById(`angka_final_${idSiswa}`);

            if(semuaKosong) {
                finalInput.value = "";
                angkaFinalDiv.innerText = "-";
                const badgeInfo = window.getBadgeInfo("");
                badgeSpan.className = `text-[10px] font-extrabold px-1.5 py-0.5 rounded-lg block border shadow-sm transition-colors duration-300 ${badgeInfo.class}`;
                badgeSpan.innerText = badgeInfo.text;
            } else {
                let finalScore = Math.round(total);
                finalInput.value = finalScore;
                angkaFinalDiv.innerText = finalScore;
                const badgeInfo = window.getBadgeInfo(finalScore);
                badgeSpan.className = `text-[10px] font-extrabold px-1.5 py-0.5 rounded-lg block border shadow-sm transition-colors duration-300 ${badgeInfo.class}`;
                badgeSpan.innerText = badgeInfo.text;
            }
        };

        window.kembaliKeDashboard = function() {
            activeTugas = null;
            document.body.style.background = 'linear-gradient(135deg, #111827 0%, #312e81 100%)';
            document.getElementById('panelRumus').classList.add('hidden');
            document.getElementById('iconRumus').classList.remove('rotate-180');
            switchView(viewDashboard);
        };

        window.simpanKeServer = function() {
            const btn = document.getElementById('btnSimpanNilai');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="spinner"></span> <span class="ml-3 tracking-wide">Menyinkronkan Data...</span>';
            btn.disabled = true;

            const { idKelas, idMapel } = activeTugas;
            const namaGuru = dataGuruAll[loggedInGuruId].nama;
            const timestamp = new Date().toISOString();

            let promises = [];
            const rows = document.querySelectorAll('.row-nilai');

            rows.forEach(row => {
                const idSiswa = row.dataset.idsiswa;
                const finalVal = document.getElementById(`final_${idSiswa}`).value;
                const dbRef = ref(db, `TahunAjaran/${activeSemesterGuru}/Nilai/${idKelas}/${idMapel}/${idSiswa}`);
                
                if(finalVal !== "") {
                    let detailObj = {};
                    activeKomponen.forEach(k => {
                        const inp = document.getElementById(`input_${idSiswa}_${k.id}`);
                        detailObj[k.id] = inp ? parseFloat(inp.value) || 0 : 0;
                    });

                    let p = set(dbRef, { 
                        nilaiAngka: parseFloat(finalVal), 
                        detail: detailObj,
                        diinputOleh: namaGuru, 
                        timestamp: timestamp 
                    });
                    promises.push(p);
                } else {
                    promises.push(set(dbRef, null)); 
                }
            });

            Promise.all(promises).then(() => {
                setTimeout(() => {
                    btn.innerHTML = '<i class="fas fa-check-circle mr-3 text-2xl"></i> Semua Tersimpan!';
                    btn.classList.replace('bg-indigo-600', 'bg-green-500');
                    btn.classList.replace('hover:bg-indigo-700', 'hover:bg-green-600');
                    btn.classList.replace('shadow-[0_8px_20px_rgba(79,70,229,0.4)]', 'shadow-[0_8px_20px_rgba(34,197,94,0.4)]');
                    
                    setTimeout(() => {
                        btn.innerHTML = originalContent;
                        btn.classList.replace('bg-green-500', 'bg-indigo-600');
                        btn.classList.replace('hover:bg-green-600', 'hover:bg-indigo-700');
                        btn.classList.replace('shadow-[0_8px_20px_rgba(34,197,94,0.4)]', 'shadow-[0_8px_20px_rgba(79,70,229,0.4)]');
                        btn.disabled = false;
                        kembaliKeDashboard();
                    }, 1200);
                }, 500); 
            }).catch(error => {
                alert("Koneksi Error. Gagal menyimpan: " + error.message);
                btn.innerHTML = originalContent;
                btn.disabled = false;
            });
        };

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw_guru.js'); }); }
    </script>
</body>
</html>
